name: Workflow Keepalive

on:
  schedule:
    # Run monthly to keep scheduled workflows in public repos from being disabled
    # due to inactivity on the default branch.
    - cron: '17 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update keepalive timestamp
        run: |
          mkdir -p .github
          printf "Last keepalive run: %s\n" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .github/keepalive.md

      - name: Commit keepalive update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.md
          git commit -m "chore: keep workflows active"
          git push origin HEAD:${{ github.event.repository.default_branch }}
