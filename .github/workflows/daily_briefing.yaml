name: Morning Market Briefing

on:
  schedule:
    # GitHub Actions cron is UTC only. We schedule both 15:00 and 16:00 UTC,
    # then gate inside the job using America/Los_Angeles local time so the
    # briefing always runs at 8:00 AM PT across PST/PDT.
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: morning-market-briefing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Check local schedule window
      id: schedule_gate
      env:
        EVENT_NAME: ${{ github.event_name }}
        TRIGGER_SCHEDULE: ${{ github.event.schedule }}
      run: |
        LOCAL_TS=$(TZ=America/Los_Angeles date +'%Y-%m-%d %H:%M:%S %Z')
        LOCAL_HOUR=$(TZ=America/Los_Angeles date +%H)
        LOCAL_TZ=$(TZ=America/Los_Angeles date +%Z)
        echo "local_ts=$LOCAL_TS" >> "$GITHUB_OUTPUT"
        echo "local_hour=$LOCAL_HOUR" >> "$GITHUB_OUTPUT"
        echo "local_tz=$LOCAL_TZ" >> "$GITHUB_OUTPUT"
        echo "trigger_schedule=$TRIGGER_SCHEDULE" >> "$GITHUB_OUTPUT"
        echo "Local time: $LOCAL_TS"
        echo "Triggered by schedule: ${TRIGGER_SCHEDULE:-<manual>}"

        if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "Proceeding: manual run bypasses the schedule gate."
        elif [ "$LOCAL_TZ" = "PDT" ] && [ "$TRIGGER_SCHEDULE" = "0 15 * * *" ] && [ "$LOCAL_HOUR" -ge 8 ] && [ "$LOCAL_HOUR" -le 10 ]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "Proceeding: PDT should execute the 15:00 UTC schedule, and this run is within the delay-tolerant window."
        elif [ "$LOCAL_TZ" = "PST" ] && [ "$TRIGGER_SCHEDULE" = "0 16 * * *" ] && [ "$LOCAL_HOUR" -ge 8 ] && [ "$LOCAL_HOUR" -le 10 ]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "Proceeding: PST should execute the 16:00 UTC schedule, and this run is within the delay-tolerant window."
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
          echo "Skipping: this schedule/local-time combination is not the intended 8 AM PT run."
        fi

    - name: Checkout code
      if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run == 'true' }}
      uses: actions/checkout@v4
      
    - name: Set up Python
      if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run == 'true' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run == 'true' }}
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Briefing
      if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run == 'true' }}
      env:
        # LLM key(s): generator supports GEMINI_API_KEY.
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        # Ensure briefing reads from the same MotherDuck DB as the crawler (avoids large yfinance backfills).
        MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        MOTHERDUCK_STRICT: "1"
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
      run: |
        python run.py
