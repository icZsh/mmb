name: Stock Crawler

on:
  schedule:
    # GitHub Actions cron is UTC only. We schedule both possible UTC windows,
    # then gate inside the job using America/Los_Angeles local time so the
    # crawler always runs at 7:50 AM PT across PST/PDT, a few minutes before
    # the 8:00 AM briefing job.
    - cron: '50 14 * * *'
    - cron: '50 15 * * *'
  workflow_dispatch:

concurrency:
  group: stock-crawler-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check local schedule window
        id: schedule_gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_SCHEDULE: ${{ github.event.schedule }}
        run: |
          LOCAL_TS=$(TZ=America/Los_Angeles date +'%Y-%m-%d %H:%M:%S %Z')
          LOCAL_HOUR=$(TZ=America/Los_Angeles date +%H)
          LOCAL_TZ=$(TZ=America/Los_Angeles date +%Z)
          echo "local_ts=$LOCAL_TS" >> "$GITHUB_OUTPUT"
          echo "local_hour=$LOCAL_HOUR" >> "$GITHUB_OUTPUT"
          echo "local_tz=$LOCAL_TZ" >> "$GITHUB_OUTPUT"
          echo "trigger_schedule=$TRIGGER_SCHEDULE" >> "$GITHUB_OUTPUT"
          echo "Local time: $LOCAL_TS"
          echo "Triggered by schedule: ${TRIGGER_SCHEDULE:-<manual>}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Proceeding: manual run bypasses the schedule gate."
          elif [ "$LOCAL_TZ" = "PDT" ] && [ "$TRIGGER_SCHEDULE" = "50 14 * * *" ] && [ "$LOCAL_HOUR" -ge 7 ] && [ "$LOCAL_HOUR" -le 9 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Proceeding: PDT should execute the 14:50 UTC schedule, and this run is within the delay-tolerant window."
          elif [ "$LOCAL_TZ" = "PST" ] && [ "$TRIGGER_SCHEDULE" = "50 15 * * *" ] && [ "$LOCAL_HOUR" -ge 7 ] && [ "$LOCAL_HOUR" -le 9 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Proceeding: PST should execute the 15:50 UTC schedule, and this run is within the delay-tolerant window."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: this schedule/local-time combination is not the intended pre-briefing crawler run."
          fi

      - name: Checkout code
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run == 'true' }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crawler Script
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run == 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MOTHERDUCK_STRICT: "1"
        run: |
          python src/data/stock_crawler.py
